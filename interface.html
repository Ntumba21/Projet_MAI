<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAI — My AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app {
      width: 420px;
      height: 700px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── En-tête ── */
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .header-info h1 {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .header-info p {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Bandeau âge ── */
    .age-bar {
      background: #f8f9fa;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #e8eaed;
      font-size: 13px;
      color: #555;
    }

    .age-bar input {
      width: 60px;
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }

    .age-bar button {
      padding: 4px 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Indicateur de niveau ── */
    .niveau-bar {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      transition: all 0.3s;
    }

    .niveau-soutien_leger    { background: #e8f5e9; color: #2e7d32; }
    .niveau-orientation_pro  { background: #fff8e1; color: #f57f17; }
    .niveau-urgence          { background: #ffebee; color: #c62828; }
    .niveau-urgence_mineur   { background: #ffebee; color: #c62828; }

    /* ── Zone de messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.mai {
      background: #f0f4ff;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    .message.user {
      background: #1a73e8;
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .message .score-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.65;
    }

    /* ── Indicateur "MAI écrit..." ── */
    .typing {
      display: none;
      align-self: flex-start;
      background: #f0f4ff;
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .typing span {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #1a73e8;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Zone de saisie ── */
    .input-zone {
      padding: 14px 16px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-zone textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 20px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-zone textarea:focus {
      border-color: #1a73e8;
    }

    .btn-send {
      width: 42px;
      height: 42px;
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-send:hover { background: #1557b0; }
    .btn-send:disabled { background: #ccc; cursor: default; }

    /* ── Disclaimer ── */
    .disclaimer {
      text-align: center;
      font-size: 10px;
      color: #aaa;
      padding: 6px 16px 10px;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- En-tête -->
  <div class="header">
    <div class="avatar">🤍</div>
    <div class="header-info">
      <h1>MAI</h1>
      <p><span class="status-dot"></span>En ligne · My AI</p>
    </div>
  </div>

  <!-- Bandeau âge -->
  <div class="age-bar">
    <span>Ton âge :</span>
    <input type="number" id="age-input" placeholder="ex: 23" min="1" max="120">
    <button onclick="definirAge()">Confirmer</button>
    <span id="age-affiche" style="color:#1a73e8; font-weight:500;"></span>
  </div>

  <!-- Indicateur de niveau -->
  <div class="niveau-bar niveau-soutien_leger" id="niveau-bar">
    🟢 Soutien léger
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <!-- Message de bienvenue -->
    <div class="message mai">
      Bonjour 👋 Je suis MAI, ton espace d'écoute bienveillant.<br><br>
      Comment vas-tu aujourd'hui ?
    </div>
  </div>

  <!-- Indicateur de frappe -->
  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <!-- Zone de saisie -->
  <div class="input-zone">
    <textarea
      id="input-msg"
      placeholder="Écris ton message..."
      rows="1"
      onkeydown="gererTouche(event)"
      oninput="ajusterHauteur(this)"
    ></textarea>
    <button class="btn-send" id="btn-send" onclick="envoyerMessage()">➤</button>
  </div>

  <div class="disclaimer">
    MAI ne remplace pas un professionnel de santé · Urgence : 15 · Suicide : 3114
  </div>

</div>

<script>
  // ── État global ──────────────────────────────────────────
  let historique = [];
  let age = 99;

  // ── Définir l'âge ────────────────────────────────────────
  function definirAge() {
    const val = parseInt(document.getElementById('age-input').value);
    if (val && val > 0 && val < 120) {
      age = val;
      document.getElementById('age-affiche').textContent = `✓ ${val} ans`;
    }
  }

  // ── Ajuster la hauteur du textarea ───────────────────────
  function ajusterHauteur(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ── Envoyer avec Entrée (Shift+Entrée = saut de ligne) ───
  function gererTouche(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      envoyerMessage();
    }
  }

  // ── Ajouter un message dans la fenêtre ───────────────────
  function ajouterMessage(texte, role, niveau = null, score = null) {
    const zone = document.getElementById('messages');

    const div = document.createElement('div');
    div.classList.add('message', role);
    div.innerHTML = texte.replace(/\n/g, '<br>');

    if (niveau && score !== null) {
      const tag = document.createElement('div');
      tag.classList.add('score-tag');
      tag.textContent = `Score : ${score}`;
      div.appendChild(tag);
    }

    zone.appendChild(div);
    zone.scrollTop = zone.scrollHeight;
  }

  // ── Mettre à jour le bandeau de niveau ───────────────────
  function mettreAJourNiveau(niveau) {
    const bar = document.getElementById('niveau-bar');
    bar.className = `niveau-bar niveau-${niveau}`;

    const labels = {
      soutien_leger:   '🟢 Soutien léger',
      orientation_pro: '🟡 Orientation professionnelle',
      urgence:         '🔴 Urgence — aide immédiate',
      urgence_mineur:  '🔴 Urgence — Protocole mineur',
    };
    bar.textContent = labels[niveau] || niveau;
  }

  // ── Envoyer un message à MAI ─────────────────────────────
  async function envoyerMessage() {
    const input = document.getElementById('input-msg');
    const texte = input.value.trim();
    if (!texte) return;

    // Afficher le message de l'utilisateur
    ajouterMessage(texte, 'user');
    historique.push({ role: 'user', content: texte });

    // Réinitialiser le champ
    input.value = '';
    input.style.height = 'auto';

    // Désactiver le bouton + afficher "MAI écrit..."
    document.getElementById('btn-send').disabled = true;
    document.getElementById('typing').style.display = 'block';
    document.getElementById('messages').scrollTop =
      document.getElementById('messages').scrollHeight;

    try {
      // Appel au serveur MAI
      const reponse = await fetch('http://127.0.0.1:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: historique, age: age })
      });

      const data = await reponse.json();

      // Cacher "MAI écrit..."
      document.getElementById('typing').style.display = 'none';

      // Afficher la réponse
      ajouterMessage(data.reponse, 'mai', data.niveau, data.score);
      historique.push({ role: 'assistant', content: data.reponse });

      // Mettre à jour le niveau
      mettreAJourNiveau(data.niveau);

    } catch (err) {
      document.getElementById('typing').style.display = 'none';
      ajouterMessage(
        "❌ Impossible de contacter le serveur. Vérifie qu'uvicorn est bien lancé.",
        'mai'
      );
    }

    document.getElementById('btn-send').disabled = false;
    document.getElementById('input-msg').focus();
  }
</script>

</body>
</html>
